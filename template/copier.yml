_min_copier_version: "9.4.0"
_subdirectory: "."
_answers_file: ".demo-template-version"

# These are answered programmatically by the CLI; users never see prompts.
name:
  type: str
  help: "Demo / Fly app name (kebab-case)"

stack:
  type: str
  help: "Which stack: nextjs | nextjs-fastapi | fastapi | streamlit | static | bare"
  choices:
    - nextjs
    - nextjs-fastapi
    - fastapi
    - streamlit
    - static
    - bare

stateful:
  type: bool
  help: "Does this stack need SQLite + a Fly volume?"
  default: false

internal_port:
  type: int
  help: "Port the container exposes (3000 for nextjs, 8000 for fastapi, etc.)"
  default: 3000

domain_base:
  type: str
  help: "Subdomain base (results in <name>.<domain_base>)"
  default: "demos.buildwithbos.com"

# Files Copier should not copy into rendered demos.
# IMPORTANT: this list REPLACES Copier's built-in default exclude list (it does
# not extend it), so we must include the defaults too — otherwise copier.yml
# itself leaks into every rendered demo.
_exclude:
  - "copier.yml"
  - "copier.yaml"
  - "~*"
  - "*.py[cod]"
  - "__pycache__"
  - ".git"
  - ".DS_Store"
  - ".svn"

# Post-render cleanup. For nextjs-fastapi, the real Dockerfile/fly.toml/compose.yml
# live in web/ and api/ (created by the scaffolder); the top-level renderings
# are fail-fast placeholders that should be removed.
_tasks:
  - "{% if stack == 'nextjs-fastapi' %}rm -f Dockerfile fly.toml compose.yml{% endif %}"
